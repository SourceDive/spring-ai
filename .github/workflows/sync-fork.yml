name: Sync Fork from Upstream

on:
  schedule:
    # 每天 UTC 0:00（北京时间 8:00）
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: SourceDive/sync-fork@v1.1
        with:
          upstream_repo: spring-projects/spring-ai
          github_token: ${{ secrets.SYNC_FORK_TOKEN }}
          sync_tags: 'true'
          sync_branches: 'true'
          target_branch: main
